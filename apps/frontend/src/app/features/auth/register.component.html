<div
  class="bg-slate-50 flex grow items-center justify-center p-6"
>
  <div class="w-full max-w-md">
    <div
      class="bg-white rounded-2xl shadow-md border border-slate-100 px-6 py-6 sm:px-8 sm:py-8"
    >
      <h1 class="text-lg sm:text-xl font-semibold text-slate-900 mb-6">
        Kreirajte svoj nalog
      </h1>

      <form [formGroup]="form" (ngSubmit)="handleSubmit()" class="space-y-5">
        <!-- Name -->
        <div>
          <label
            for="name"
            class="block text-sm font-medium text-slate-700 mb-1"
          >
            Ime
          </label>
          <div
            class="flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2.5 text-sm shadow-sm transition ease-out focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500"
            [class.border-slate-200]="
              !form.get('name')?.invalid || !form.get('name')?.touched
            "
            [class.border-red-500]="
              form.get('name')?.invalid && form.get('name')?.touched
            "
            [class.focus-within:ring-red-500]="
              form.get('name')?.invalid && form.get('name')?.touched
            "
          >
            <input
              id="name"
              type="text"
              formControlName="name"
              class="w-full border-none bg-transparent text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-0"
              placeholder="Your name"
            />
          </div>
          @if (getErrorMessage('name'); as error) {
            <p class="mt-1 text-xs text-red-500">
              {{ error }}
            </p>
          }
        </div>

        <!-- Email -->
        <div>
          <label
            for="email"
            class="block text-sm font-medium text-slate-700 mb-1"
          >
            Email
          </label>
          <div
            class="flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2.5 text-sm shadow-sm transition ease-out focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500"
            [class.border-slate-200]="
              !form.get('email')?.invalid || !form.get('email')?.touched
            "
            [class.border-red-500]="
              form.get('email')?.invalid && form.get('email')?.touched
            "
            [class.focus-within:ring-red-500]="
              form.get('email')?.invalid && form.get('email')?.touched
            "
          >
            <input
              id="email"
              type="email"
              formControlName="email"
              class="w-full border-none bg-transparent text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-0"
              placeholder="you@example.com"
            />
          </div>
          @if (getErrorMessage('email'); as error) {
            <p class="mt-1 text-xs text-red-500">
              {{ error }}
            </p>
          }
        </div>

        <!-- Password -->
        <div>
          <label
            for="password"
            class="block text-sm font-medium text-slate-700 mb-1"
          >
            Lozinka
          </label>
          <div
            class="flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2.5 text-sm shadow-sm transition ease-out focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500"
            [class.border-slate-200]="
              !form.get('password')?.invalid || !form.get('password')?.touched
            "
            [class.border-red-500]="
              form.get('password')?.invalid && form.get('password')?.touched
            "
            [class.focus-within:ring-red-500]="
              form.get('password')?.invalid && form.get('password')?.touched
            "
          >
            <input
              id="password"
              type="password"
              formControlName="password"
              class="w-full border-none bg-transparent text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-0"
              placeholder="••••••••"
            />
          </div>
          @if (getErrorMessage('password'); as error) {
            <p class="mt-1 text-xs text-red-500">
              {{ error }}
            </p>
          }
        </div>

        <!-- Phone -->
        <div>
          <label
            for="phone"
            class="block text-sm font-medium text-slate-700 mb-1"
          >
            Telefon
          </label>
          <div
            class="flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2.5 text-sm shadow-sm transition ease-out focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500"
          >
            <input
              id="phone"
              type="tel"
              formControlName="phone"
              class="w-full border-none bg-transparent text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-0"
              placeholder="+1 234 567 890"
            />
          </div>
        </div>

        <!-- Actions -->
        <div class="pt-2 flex flex-col gap-3">
          <button
            type="submit"
            [disabled]="form.invalid || isSubmitting()"
            class="inline-flex w-full items-center justify-center rounded-full border border-transparent bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-indigo-700 hover:shadow-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:bg-slate-300 disabled:text-slate-600"
          >
            @if (isSubmitting()) {
              <span
                class="mr-2 h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"
              ></span>
              Kreiranje naloga...
            } @else {
              Kreirajte nalog
            }
          </button>
          <p class="text-center text-sm text-slate-600">
            Već imate nalog?
            <a routerLink="/login" class="font-medium text-indigo-600 hover:text-indigo-500">
              Prijavite se
            </a>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
